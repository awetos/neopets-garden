name: Deploy to Neocities

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-to-neocities
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install deps and build
        run: |
          npm ci
          npm run build

      - name: Debug generated files
        run: |
            node -v
            npm -v
            find out/_next/static/chunks -maxdepth 1 -type f -print
            find out -name '*..css' -print

      - name: Deploy to Neocities
        uses: bcomnes/deploy-to-neocities@v3
        with:
          api_key: ${{ secrets.NEOCITIES_NEOGARDEN_API_TOKEN }}
          dist_dir: out
          cleanup: false
          neocities_supporter: false
          preview_before_deploy: true
